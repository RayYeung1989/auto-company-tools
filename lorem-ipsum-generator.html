<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - Free Online Text Generator</title>
    <meta name="description" content="Free online Lorem Ipsum generator. Generate random placeholder text with customizable paragraphs, words, or sentences. 100% client-side.">
    <meta name="keywords" content="lorem ipsum, lorem ipsum generator, placeholder text, dummy text, generator">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: #a0aec0;
            font-size: 1.1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            color: #a0aec0;
            font-size: 0.9rem;
            font-weight: 500;
        }
        select, input[type="number"], input[type="text"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            border-color: #00d4ff;
        }
        select option {
            background: #1a1a2e;
        }
        .btn {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #00d4ff;
        }
        .stats {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            color: #64748b;
            font-size: 0.9rem;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        footer {
            text-align: center;
            color: #64748b;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }
        footer a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lorem Ipsum Generator</h1>
            <p class="tagline">Generate random placeholder text instantly. 100% client-side.</p>
        </header>

        <div class="card">
            <div class="options">
                <div class="option-group">
                    <label for="type">Output Type</label>
                    <select id="type">
                        <option value="paragraphs">Paragraphs</option>
                        <option value="words">Words</option>
                        <option value="sentences">Sentences</option>
                        <option value="bytes">Bytes</option>
                    </select>
                </div>
                <div class="option-group">
                    <label for="count">Count</label>
                    <input type="number" id="count" value="3" min="1" max="100">
                </div>
                <div class="option-group">
                    <label for="start">Start with</label>
                    <select id="start">
                        <option value="classic">Classic "Lorem ipsum..."</option>
                        <option value="random">Random words</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="generate()">Generate</button>
        </div>

        <div class="card">
            <textarea id="output" placeholder="Your generated text will appear here..."></textarea>
            <div class="stats">
                <div class="stat">
                    <span>Words:</span>
                    <span id="wordCount">0</span>
                </div>
                <div class="stat">
                    <span>Characters:</span>
                    <span id="charCount">0</span>
                </div>
                <div class="stat">
                    <span>Sentences:</span>
                    <span id="sentenceCount">0</span>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="copy()">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const words = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
            'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
            'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
            'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
            'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate',
            'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint',
            'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia',
            'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'neque', 'porro',
            'quisquam', 'nihil', 'impedit', 'quo', 'minus', 'quod', 'maxime', 'placeat',
            'facere', 'possimus', 'omnis', 'voluptas', 'assumenda', 'repellendus',
            'temporibus', 'autem', 'quibusdam', 'officiis', 'debitis', 'aut', 'rerum',
            'necessitatibus', 'saepe', 'eveniet', 'voluptates', 'repudiandae', 'sint',
            'molestiae', 'recusandae', 'itaque', 'earum', 'hic', 'tenetur', 'sapiente',
            'delectus', 'reiciendis', 'voluptatibus', 'maiores', 'alias', 'perferendis',
            'doloribus', 'asperiores', 'repellat'
        ];

        const classicStart = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.';

        function getRandomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function getRandomSentence() {
            const length = Math.floor(Math.random() * 10) + 5;
            const sentenceWords = [];
            for (let i = 0; i < length; i++) {
                sentenceWords.push(getRandomWord());
            }
            let sentence = sentenceWords.join(' ');
            sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1);
            return sentence + '.';
        }

        function getRandomParagraph() {
            const sentenceCount = Math.floor(Math.random() * 5) + 3;
            const sentences = [];
            for (let i = 0; i < sentenceCount; i++) {
                sentences.push(getRandomSentence());
            }
            return sentences.join(' ');
        }

        function generate() {
            const type = document.getElementById('type').value;
            const count = parseInt(document.getElementById('count').value) || 1;
            const startWith = document.getElementById('start').value;
            let output = '';

            switch(type) {
                case 'paragraphs':
                    for (let i = 0; i < count; i++) {
                        if (i === 0 && startWith === 'classic') {
                            output += classicStart + ' ' + getRandomParagraph();
                        } else {
                            output += getRandomParagraph();
                        }
                        if (i < count - 1) output += '\n\n';
                    }
                    break;
                case 'words':
                    const wordList = [];
                    for (let i = 0; i < count; i++) {
                        wordList.push(getRandomWord());
                    }
                    if (startWith === 'classic') {
                        wordList[0] = 'lorem';
                        wordList[1] = 'ipsum';
                    }
                    output = wordList.join(' ');
                    break;
                case 'sentences':
                    for (let i = 0; i < count; i++) {
                        if (i === 0 && startWith === 'classic') {
                            output += classicStart;
                        } else {
                            output += getRandomSentence();
                        }
                        if (i < count - 1) output += ' ';
                    }
                    break;
                case 'bytes':
                    const bytes = Math.min(count, 1000);
                    const byteChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ';
                    for (let i = 0; i < bytes; i++) {
                        output += byteChars.charAt(Math.floor(Math.random() * byteChars.length));
                    }
                    break;
            }

            document.getElementById('output').value = output;
            updateStats();
        }

        function updateStats() {
            const text = document.getElementById('output').value;
            const words = text.trim() ? text.trim().split(/\s+/) : [];
            const sentences = text.split(/[.!?]+/).filter(s => s.trim());

            document.getElementById('wordCount').textContent = words.length;
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('sentenceCount').textContent = sentences.length;
        }

        function copy() {
            const textarea = document.getElementById('output');
            textarea.select();
            document.execCommand('copy');

            const btn = document.querySelector('.btn-secondary');
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }

        document.getElementById('output').addEventListener('input', updateStats);

        // Generate on load
        generate();
    </script>
</body>
</html>
